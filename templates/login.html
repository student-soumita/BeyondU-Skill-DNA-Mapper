<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyondU - Authorization Layer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
    .auth-container {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
        position: relative;
        background: radial-gradient(circle at 20% 20%, rgba(124, 58, 237, .25), transparent 30%),
                    radial-gradient(circle at 80% 30%, rgba(99, 102, 241, .22), transparent 30%),
                    radial-gradient(circle at 60% 85%, rgba(168, 85, 247, .18), transparent 35%),
                    linear-gradient(135deg, #050816 0%, #0b1025 35%, #17113b 100%);
    }

    .auth-container::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(circle, #ffffff66 2px, transparent 2px),
                          radial-gradient(circle, #8b5cf655 2px, transparent 2px),
                          radial-gradient(circle, #c084fc44 1.5px, transparent 1.5px);
        background-size: 180px 180px, 240px 240px, 120px 120px;
        background-position: 0 0, 80px 120px, 50px 60px;
        pointer-events: none;
    }

    .auth-container::after {
        content: "";
        position: absolute;
        width: 700px;
        height: 700px;
        right: -250px;
        top: -180px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(124, 58, 237, .25), transparent 70%);
        filter: blur(30px);
    }

    .auth-card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 440px;
        padding: 42px;
        background: rgba(17, 24, 39, .82);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, .08);
        border-radius: 22px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, .55), 0 0 30px rgba(124, 58, 237, .18);
    }

    .auth-logo { text-align: center; font-size: 34px; font-weight: 700; color: #8b5cf6; margin-bottom: 8px; }
    .auth-subtitle { text-align: center; color: #cbd5e1; margin-bottom: 28px; font-size: 15px; }
    
    .alert-box { display: none; margin-bottom: 18px; padding: 12px; border-radius: 10px; }
    .error-alert { background: rgba(239, 68, 68, .12); border: 1px solid #ef4444; color: #fecaca; }
    .success-alert { background: rgba(16, 185, 129, .12); border: 1px solid #10b981; color: #a7f3d0; }

    .form-group { margin-bottom: 18px; display: flex; flex-direction: column; gap: 8px; }
    .form-label { color: #cbd5e1; font-size: 13px; font-weight: 600; }
    .form-input { padding: 14px 16px; border-radius: 12px; border: 1px solid #374151; background: #0f172a; color: white; transition: .3s; font-size: 14px; }
    .form-input:focus { outline: none; border-color: #8b5cf6; box-shadow: 0 0 15px rgba(139, 92, 246, .35); }
    
    .auth-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 700; color: white; background: linear-gradient(90deg, #7c3aed, #8b5cf6); transition: .3s; }
    .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(124, 58, 237, .45); }
    
    .toggle-mode-box { margin-top: 24px; text-align: center; color: #94a3b8; font-size: 14px; display: flex; flex-direction: column; gap: 10px; }
    .toggle-link { color: #a78bfa; font-weight: 700; cursor: pointer; text-decoration: none; }
    .toggle-link:hover { color: white; }
    </style>
</head>
<body class="auth-container">
<img src="{{ url_for('static', filename='images/login_character.png') }}"
style="position:absolute;right:4%;bottom:0;width:480px;pointer-events:none;opacity:.95;">
    
<div class="auth-card" id="mainCard">
    <div class="auth-logo">Ω BeyondU</div>
    <div class="auth-subtitle" id="authSubtitle">Skill Mapping System Authorization</div>

    <div class="alert-box error-alert" id="errorBox"></div>
    <div class="alert-box success-alert" id="successBox"></div>

    <form id="loginForm">
        <div class="form-group" id="emailGroup" style="display: none;">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="emailInput" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-input" id="usernameInput" placeholder="Enter username" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="passwordInput" placeholder="Enter password" required>
        </div>
        <button type="submit" class="auth-btn" id="submitBtn">Authenticate</button>
    </form>

    <div class="toggle-mode-box">
        <span class="toggle-link" id="forgotPasswordLink">Forgot Password?</span>
        <div>
            <span id="toggleText">New to the framework?</span> 
            <span class="toggle-link" id="toggleModeLink">Create Account</span>
        </div>
    </div>
</div>

<div class="auth-card" id="forgotCard" style="display: none;">
    <div class="auth-logo">Ω BeyondU</div>
    <div class="auth-subtitle">Reset Authentication Credentials</div>

    <div class="alert-box error-alert" id="forgotErrorBox"></div>
    <div class="alert-box success-alert" id="forgotSuccessBox"></div>

    <form id="forgotForm">
        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" class="form-input" id="forgotUsernameInput" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" class="form-input" id="forgotPasswordNew" placeholder="Enter new password" required>
        </div>
        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="forgotPasswordConfirm" placeholder="Confirm new password" required>
        </div>
        <button type="submit" class="auth-btn">Reset Password</button>
    </form>

    <div class="toggle-mode-box">
        <span class="toggle-link" id="backToLoginLink">Return to Authorization</span>
    </div>
</div>

    <script>
        let currentMode = 'login'; 

        // Main Login Elements
        const mainCard = document.getElementById('mainCard');
        const toggleLink = document.getElementById('toggleModeLink');
        const toggleText = document.getElementById('toggleText');
        const submitBtn = document.getElementById('submitBtn');
        const authSubtitle = document.getElementById('authSubtitle');
        const errorBox = document.getElementById('errorBox');
        const successBox = document.getElementById('successBox');
        const emailGroup = document.getElementById('emailGroup');
        const emailInput = document.getElementById('emailInput');
        const forgotPasswordLink = document.getElementById('forgotPasswordLink');

        // Forgot Password Elements
        const forgotCard = document.getElementById('forgotCard');
        const backToLoginLink = document.getElementById('backToLoginLink');
        const forgotErrorBox = document.getElementById('forgotErrorBox');
        const forgotSuccessBox = document.getElementById('forgotSuccessBox');

        // Swap between Sign-In and Registration
        toggleLink.addEventListener('click', () => {
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
            
            if (currentMode === 'login') {
                currentMode = 'register';
                authSubtitle.textContent = "Establish New Profile Credentials";
                submitBtn.textContent = "Register & Launch Profile";
                toggleText.textContent = "Already have credentials?";
                toggleLink.textContent = "Sign In instead";
                emailGroup.style.display = 'flex';
                emailInput.setAttribute('required', 'true');
                forgotPasswordLink.style.display = 'none';
            } else {
                currentMode = 'login';
                authSubtitle.textContent = "Skill Mapping System Authorization";
                submitBtn.textContent = "Authenticate";
                toggleText.textContent = "New to the framework?";
                toggleLink.textContent = "Create Account";
                emailGroup.style.display = 'none';
                emailInput.removeAttribute('required');
                forgotPasswordLink.style.display = 'block';
            }
        });

        // View Toggles for Forgot Password
        forgotPasswordLink.addEventListener('click', () => {
            mainCard.style.display = 'none';
            forgotCard.style.display = 'block';
            forgotErrorBox.style.display = 'none';
            forgotSuccessBox.style.display = 'none';
        });

        backToLoginLink.addEventListener('click', () => {
            forgotCard.style.display = 'none';
            mainCard.style.display = 'block';
        });

        // Main Auth Submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = 'none';
            successBox.style.display = 'none';
            
            // Show loading state
            const originalBtnText = submitBtn.textContent;
            submitBtn.textContent = "Processing...";
            submitBtn.disabled = true;

            const payload = {
                username: document.getElementById('usernameInput').value.trim(),
                password: document.getElementById('passwordInput').value.trim(),
                email: document.getElementById('emailInput').value.trim(),
                action: currentMode
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    if (data.redirect) {
                        window.location.href = data.redirect;
                    } else {
                        successBox.textContent = data.message;
                        successBox.style.display = 'block';
                        document.getElementById('loginForm').reset();
                        // Automatically switch back to login view after registration text
                        if(currentMode === 'register') { toggleLink.click(); }
                    }
                } else {
                    errorBox.textContent = data.message || "Execution verification failure.";
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.textContent = "Network error connecting to verification framework.";
                errorBox.style.display = 'block';
            } finally {
                submitBtn.textContent = originalBtnText;
                submitBtn.disabled = false;
            }
        });

        // Forgot Password Submit
        document.getElementById("forgotForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            forgotErrorBox.style.display = "none";
            forgotSuccessBox.style.display = "none";

            const username = document.getElementById("forgotUsernameInput").value.trim();
            const password = document.getElementById("forgotPasswordNew").value;
            const confirm = document.getElementById("forgotPasswordConfirm").value;

            if (password !== confirm) {
                forgotErrorBox.textContent = "Passwords do not match.";
                forgotErrorBox.style.display = "block";
                return;
            }

            const response = await fetch("/api/auth/reset-password", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    password
                })
            });

            const data = await response.json();

            if (data.success) {
                forgotSuccessBox.textContent = data.message;
                forgotSuccessBox.style.display = "block";

                setTimeout(() => {
                    forgotCard.style.display = "none";
                    mainCard.style.display = "block";
                    document.getElementById("forgotForm").reset(); // clear fields
                }, 1500);

            } else {
                forgotErrorBox.textContent = data.message;
                forgotErrorBox.style.display = "block";
            }
        });
    </script>
</body>
</html>
